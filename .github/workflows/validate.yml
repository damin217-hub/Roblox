name: Validate Roblox project

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Selene
        run: cargo install selene --version 0.31.0 --locked
      - name: Lint Luau
        run: selene src tests
      - uses: rojo-rbx/setup-rojo@v1
        with:
          version: 7.6.1
      - name: Build All Ages place
        run: rojo build all-ages.project.json -o /tmp/all-ages.rbxlx
      - name: Build Free Draw 16+ place
        run: rojo build free-draw.project.json -o /tmp/free-draw.rbxlx
